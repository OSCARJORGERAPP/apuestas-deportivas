stages:
  - install
  - lint
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"

install:
  stage: install
  image: node:20
  script:
    - npm ci
  cache:
    paths:
      - node_modules/
    policy: pull-push

lint:
  stage: lint
  image: node:20
  script:
    - npm run lint
  cache:
    paths:
      - node_modules/
    policy: pull
  allow_failure: true

test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.61.0-noble
  services:
    - mongo:7
    - mailhog/mailhog:latest
  variables:
    MONGODB_URI: "mongodb://mongo:27017/apuestas-test"
    JWT_SECRET: "test-secret-key-for-ci-do-not-use-in-production"
    MAILHOG_HOST: "mailhog"
    MAILHOG_PORT: "1025"
    NODE_ENV: "test"
  script:
    - npm ci
    - npm run test
  cache:
    paths:
      - node_modules/
    policy: pull
  artifacts:
    paths:
      - playwright-report/
    expire_in: 30 days
    when: always
  allow_failure: true

build:
  stage: build
  image: node:20
  script:
    - npm run build
  cache:
    paths:
      - node_modules/
    policy: pull
  artifacts:
    paths:
      - .next/
      - out/
    expire_in: 30 days

deploy:
  stage: deploy
  image: node:20
  script:
    - echo "Deploy placeholder - implementar según infraestructura"
  only:
    - main
  when: manual
